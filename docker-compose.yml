services:
  postgres:
    image: postgres:17-alpine
    container_name: ready_template-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ready_template}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-54123}:5432"
    volumes:
      - ready_template-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ready_template}"]
      interval: 5s
      timeout: 3s
      retries: 10
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: ready_template-otel-lgtm
    ports:
      - "3003:3000"   # Grafana
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ready_template-lgtm-data:/data
volumes:
  ready_template-postgres-data:
  ready_template-lgtm-data:
